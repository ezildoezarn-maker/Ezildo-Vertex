<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escolher Pagamento</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#1e3a8a,#0f172a);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* BOX */
.box{
  width:90%;
  max-width:350px;
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
  margin-bottom:10px;
}

.info{
  font-size:14px;
  color:#555;
}

/* BOTÕES */
button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.deposito{
  background:linear-gradient(45deg,#22c55e,#16a34a);
  color:white;
}

.saldo{
  background:linear-gradient(45deg,#3b82f6,#2563eb);
  color:white;
}

.voltar{
  background:#eee;
}
</style>
</head>

<body>

<div class="box">

  <h2>💳 Forma de Pagamento</h2>

  <p class="info" id="infoPacote">
    Pacote...
  </p>

  <button class="deposito" onclick="irDeposito()">
    💳 Fazer Depósito
  </button>

  <button class="saldo" onclick="usarSaldo()">
    💰 Usar Saldo
  </button>

  <button class="voltar" onclick="voltar()">
    ⬅ Voltar
  </button>

</div>

<script>

// PEGAR DADOS DA URL
const params = new URLSearchParams(window.location.search);
const pacote = params.get("pacote");
const preco = params.get("preco");

// MOSTRAR INFO
document.getElementById("infoPacote").innerText =
  "📦 " + pacote + " - " + preco + " MT";

// IR DEPÓSITO
function irDeposito(){
  window.location.href = `deposito.html?pacote=${pacote}&preco=${preco}`;
}

// USAR SALDO
function usarSaldo(){
  window.location.href = `comprar.html?pacote=${pacote}&preco=${preco}`;
}

// VOLTAR
function voltar(){
  window.history.back();
}

</script>

</body>
</html>
