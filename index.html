<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Login / Cadastro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
    }

    .container {
      width: 90%;
      max-width: 350px;
      background: #fff;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #ff7e5f, #feb47b);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    .switch {
      margin-top: 15px;
      font-size: 14px;
      cursor: pointer;
      color: #555;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Entrar</h2>

    <input type="text" id="loginUser" placeholder="Nome">
    <input type="password" id="loginPass" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <div class="switch" onclick="mostrarCadastro()">
      Não tem conta? Criar conta
    </div>
  </div>

  <!-- CADASTRO -->
  <div id="cadastroBox" class="hidden">
    <h2>Criar Conta</h2>

    <input type="text" id="cadUser" placeholder="Nome">
    <input type="password" id="cadPass" placeholder="Senha">

    <button onclick="criarConta()">Cadastrar</button>

    <div class="switch" onclick="mostrarLogin()">
      Já tem conta? Entrar
    </div>
  </div>

</div>

<script>

function mostrarCadastro() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("cadastroBox").classList.remove("hidden");
}

function mostrarLogin() {
  document.getElementById("cadastroBox").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
}

// Criar conta
function criarConta() {
  let user = document.getElementById("cadUser").value;
  let pass = document.getElementById("cadPass").value;

  if (!user || !pass) {
    alert("Preencha tudo!");
    return;
  }

  localStorage.setItem("user", user);
  localStorage.setItem("pass", pass);

  alert("Conta criada com sucesso!");
  mostrarLogin();
}

// Login
function login() {
  let user = document.getElementById("loginUser").value;
  let pass = document.getElementById("loginPass").value;

  let savedUser = localStorage.getItem("user");
  let savedPass = localStorage.getItem("pass");

  if (user === savedUser && pass === savedPass) {
    localStorage.setItem("logado", "true");
    window.location.href = "home.html";
  } else {
    alert("Dados inválidos!");
  }
}

</script>

</body>
</html>
