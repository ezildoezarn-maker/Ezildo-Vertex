<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#ff7e5f,#feb47b);
}

.container{
  width:90%;
  max-width:350px;
  background:#fff;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

h2{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff7e5f,#feb47b);
  color:#fff;
  font-weight:bold;
  margin-top:10px;
}

.switch{
  margin-top:15px;
  font-size:14px;
  cursor:pointer;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h2>Entrar</h2>

<input type="email" id="loginUser" placeholder="Email">
<input type="password" id="loginPass" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div class="switch" onclick="mostrarCadastro()">
Não tem conta? Criar conta
</div>
</div>

<!-- CADASTRO -->
<div id="cadastroBox" class="hidden">
<h2>Criar Conta</h2>

<input type="email" id="cadUser" placeholder="Email">
<input type="password" id="cadPass" placeholder="Senha">

<button onclick="criarConta()">Cadastrar</button>

<div class="switch" onclick="mostrarLogin()">
Já tem conta? Entrar
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 TEU FIREBASE (já correto)
const firebaseConfig = {
  apiKey: "AIzaSyD...",
  authDomain: "vertex-megas.firebaseapp.com",
  projectId: "vertex-megas",
  storageBucket: "vertex-megas.appspot.com",
  messagingSenderId: "639387672439",
  appId: "1:639387672439:web:28c1be..."
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// alternar telas
window.mostrarCadastro = function(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("cadastroBox").classList.remove("hidden");
}

window.mostrarLogin = function(){
  document.getElementById("cadastroBox").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
}

// criar conta
window.criarConta = async function(){
  let email = document.getElementById("cadUser").value;
  let senha = document.getElementById("cadPass").value;

  if(!email || !senha){
    alert("Preencha tudo!");
    return;
  }

  try{
    const userCred = await createUserWithEmailAndPassword(auth,email,senha);

    // salvar no banco
    await setDoc(doc(db,"usuarios",userCred.user.uid),{
      email: email,
      saldo: 0
    });

    alert("Conta criada!");
    mostrarLogin();

  }catch(e){
    alert(e.message);
  }
}

// login
window.login = async function(){
  let email = document.getElementById("loginUser").value;
  let senha = document.getElementById("loginPass").value;

  try{
    await signInWithEmailAndPassword(auth,email,senha);
    window.location.href = "home.html";
  }catch(e){
    alert(e.message);
  }
}

</script>

</body>
  </html>
