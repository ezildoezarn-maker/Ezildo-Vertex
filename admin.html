<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.topo {
  padding: 20px;
  text-align: center;
  font-size: 20px;
  background: #020617;
}

.msg {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 20px;
  border-radius: 12px;
  font-weight: bold;
  display: none;
}

.sucesso { background: #22c55e; }
.erro { background: #ef4444; }

.box { padding: 15px; }

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
}

.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.add {
  background: linear-gradient(45deg,#22c55e,#16a34a);
  color: white;
}

.container {
  padding: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 10px;
}

.ok {
  background: green;
  color: white;
  padding: 8px;
  border: none;
  border-radius: 8px;
  margin-top: 5px;
  margin-right: 5px;
}

.no {
  background: red;
  color: white;
  padding: 8px;
  border: none;
  border-radius: 8px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div id="msg" class="msg"></div>

<div id="conteudo" style="display:none;">
  <div class="topo">⚙️ Painel Admin</div>

  <div class="box">
    <h3>💰 Adicionar Saldo</h3>
    <input id="emailUser" placeholder="Email do usuário">
    <input id="valorSaldo" type="number" placeholder="Valor">
    <button class="btn add" onclick="addSaldo()">➕ Adicionar Saldo</button>
  </div>

  <div class="container" id="lista"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYynjujS00ewRLDRKUJ2sVNv6FJFl5G9s",
  authDomain: "vertex-megas.firebaseapp.com",
  projectId: "vertex-megas"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const lista = document.getElementById("lista");

// 🔔 MENSAGEM
function mostrarMsg(texto, tipo){
  const msg = document.getElementById("msg");
  msg.innerText = texto;
  msg.className = "msg " + tipo;
  msg.style.display = "block";

  setTimeout(() => msg.style.display = "none", 3000);
}

// 🔐 PROTEÇÃO ADMIN
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const emailId = user.email.replace(/\./g, "_");
  const ref = doc(db, "usuarios", emailId);
  const snap = await getDoc(ref);

  if (!snap.exists() || !snap.data().isAdmin) {
    document.body.innerHTML = `
      <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-size:20px;
      ">
        ❌ Acesso negado
      </div>
    `;
    return;
  }

  // liberar painel
  document.getElementById("conteudo").style.display = "block";

  // carregar pedidos
  carregarPedidos();
});

// 📦 LISTAR PEDIDOS
function carregarPedidos(){
  onSnapshot(collection(db, "pedidos"), (snapshot) => {

    lista.innerHTML = "";

    snapshot.forEach((docItem) => {
      const data = docItem.data();

      lista.innerHTML += `
        <div class="card">
          <b>📱 Número:</b> ${data.numero}<br>
          <b>📦 Pacote:</b> ${data.pacote}<br>
          <b>📌 Status:</b> ${data.status}<br>

          <button class="ok" onclick="aprovar('${docItem.id}')">✅ Aprovar</button>
          <button class="no" onclick="rejeitar('${docItem.id}')">❌ Rejeitar</button>
        </div>
      `;
    });

  });
}

// ✅ APROVAR
window.aprovar = async function(id){
  await updateDoc(doc(db, "pedidos", id), {
    status: "aprovado"
  });
  mostrarMsg("Pedido aprovado!", "sucesso");
}

// ❌ REJEITAR
window.rejeitar = async function(id){
  await updateDoc(doc(db, "pedidos", id), {
    status: "rejeitado"
  });
  mostrarMsg("Pedido rejeitado!", "erro");
}

// 💰 ADICIONAR SALDO
window.addSaldo = async function(){

  const email = document.getElementById("emailUser").value;
  const valor = parseInt(document.getElementById("valorSaldo").value);

  if (!email || !valor){
    mostrarMsg("Preencha tudo!", "erro");
    return;
  }

  const emailId = email.replace(/\./g, "_");
  const ref = doc(db, "usuarios", emailId);
  const snap = await getDoc(ref);

  if (!snap.exists()){
    mostrarMsg("Usuário não encontrado!", "erro");
    return;
  }

  const saldoAtual = snap.data().saldo || 0;

  await updateDoc(ref, {
    saldo: saldoAtual + valor
  });

  mostrarMsg("Saldo adicionado!", "sucesso");

  document.getElementById("emailUser").value = "";
  document.getElementById("valorSaldo").value = "";
}

</script>

</body>
</html>
