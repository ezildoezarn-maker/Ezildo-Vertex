<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* topo */
.topo{
  padding:20px;
  text-align:center;
  background:#020617;
  font-size:20px;
}

/* mensagem */
.msg{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  border-radius:10px;
  display:none;
  font-weight:bold;
}

.sucesso{background:#22c55e;}
.erro{background:#ef4444;}

/* box */
.box{
  padding:15px;
}

input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.add{background:#22c55e;}
.admin{background:#6366f1;}
.remove{background:#ef4444;}

/* info user */
.userBox{
  background:#1e293b;
  margin-top:10px;
  padding:15px;
  border-radius:12px;
}

/* lista */
.lista{
  padding:15px;
}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="topo">⚙️ Admin Pro</div>
<div id="msg" class="msg"></div>

<div id="conteudo" style="display:none;">

<!-- 🔍 BUSCAR -->
<div class="box">
  <h3>🔎 Buscar Usuário</h3>

  <input id="emailUser" placeholder="Email">

  <button class="btn add" onclick="buscarUser()">Buscar</button>

  <div id="userInfo" class="userBox" style="display:none;"></div>
</div>

<!-- 📋 LISTA -->
<div class="lista" id="listaUsers"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDY...",
  authDomain: "vertex-megas.firebaseapp.com",
  projectId: "vertex-megas"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function msg(t,c){
  const m=document.getElementById("msg");
  m.innerText=t;
  m.className="msg "+c;
  m.style.display="block";
  setTimeout(()=>m.style.display="none",3000);
}

// 🔐 PROTEÇÃO
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="index.html";
    return;
  }

  const id=user.email.replace(/\./g,"_");
  const snap=await getDoc(doc(db,"usuarios",id));

  if(!snap.exists() || !snap.data().isAdmin){
    document.body.innerHTML="❌ Acesso negado";
    return;
  }

  document.getElementById("conteudo").style.display="block";
  carregarLista();
});

// 🔎 BUSCAR
window.buscarUser = async function(){
  const email=document.getElementById("emailUser").value;

  if(!email){
    msg("Digite email","erro");
    return;
  }

  const id=email.replace(/\./g,"_");
  const ref=doc(db,"usuarios",id);
  const snap=await getDoc(ref);

  if(!snap.exists()){
    msg("Usuário não encontrado","erro");
    return;
  }

  const d=snap.data();

  document.getElementById("userInfo").style.display="block";
  document.getElementById("userInfo").innerHTML=`
    👤 ${d.nome || "Sem nome"} <br>
    📧 ${email} <br>
    💰 Saldo: ${d.saldo || 0} MT <br>
    👑 Admin: ${d.isAdmin ? "Sim" : "Não"}

    <button class="btn add" onclick="addSaldo('${email}')">➕ Saldo</button>
    <button class="btn admin" onclick="setAdmin('${email}',true)">👑 Tornar Admin</button>
    <button class="btn remove" onclick="setAdmin('${email}',false)">❌ Remover Admin</button>
  `;
}

// 💰 SALDO
window.addSaldo = async function(email){
  const valor=prompt("Valor:");

  if(!valor) return;

  const id=email.replace(/\./g,"_");
  const ref=doc(db,"usuarios",id);
  const snap=await getDoc(ref);

  const saldo=snap.data().saldo || 0;

  await updateDoc(ref,{saldo: saldo + parseInt(valor)});

  msg("Saldo atualizado","sucesso");
  buscarUser();
}

// 👑 ADMIN
window.setAdmin = async function(email,valor){
  const id=email.replace(/\./g,"_");

  await updateDoc(doc(db,"usuarios",id),{
    isAdmin: valor
  });

  msg("Atualizado","sucesso");
  buscarUser();
}

// 📋 LISTA
async function carregarLista(){
  const snap=await getDocs(collection(db,"usuarios"));

  const lista=document.getElementById("listaUsers");
  lista.innerHTML="<h3>👥 Usuários</h3>";

  snap.forEach(docItem=>{
    const d=docItem.data();

    lista.innerHTML+=`
      <div class="card">
        ${d.email}<br>
        💰 ${d.saldo || 0} MT<br>
        👑 ${d.isAdmin ? "Admin" : "User"}
      </div>
    `;
  });
}

</script>

</body>
</html>
