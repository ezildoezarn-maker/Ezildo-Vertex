<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

/* TOPO */
.topo{
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background:#020617;
}

/* BOX */
.box{
  background:#1e293b;
  margin:15px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* INPUT PEQUENO BONITO */
input, select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
  outline:none;
  background:#0f172a;
  color:white;
  font-size:14px;
}

/* BOTÕES */
.btn{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  font-size:14px;
}

.green{background:#22c55e;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}
.orange{background:#f59e0b;}

.btn:active{
  transform:scale(0.97);
}

/* CARD */
.card{
  background:#0f172a;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  font-size:14px;
}

/* GRID BOTÕES */
.actions{
  display:flex;
  gap:5px;
  margin-top:8px;
}

.actions button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
  font-size:12px;
}

/* MSG */
#msg{
  text-align:center;
  margin-top:10px;
  font-weight:bold;
}

/* TITULOS */
h3{
  margin:0 0 10px 0;
}
</style>
</head>

<body>

<div class="topo">⚙️ Painel Admin</div>

<!-- 🔥 CRIAR USUÁRIO -->
<div class="box">

<h3>➕ Criar Usuário</h3>

<input id="email" placeholder="Email">
<input id="senha" placeholder="Senha">
<input id="saldo" type="number" placeholder="Saldo">

<select id="tipo">
  <option value="user">Usuário</option>
  <option value="admin">Admin</option>
</select>

<button class="btn green" onclick="criarUser()">Criar</button>

<div id="msg"></div>

</div>

<!-- 👥 USUÁRIOS -->
<div class="box">
<h3>👥 Usuários</h3>
<div id="usuarios"></div>
</div>

<!-- 📦 PEDIDOS -->
<div class="box">
<h3>📦 Pedidos</h3>
<div id="pedidos"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged, createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, doc, setDoc, getDoc,
  collection, onSnapshot, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYynjujS00ewRLDRKUJ2sVNv6FJFl5G9s",
  authDomain: "vertex-megas.firebaseapp.com",
  projectId: "vertex-megas"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 PROTEÇÃO ADMIN
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    window.location.href = "index.html";
    return;
  }

  const id = user.email.replace(/\./g,"_");
  const snap = await getDoc(doc(db,"usuarios",id));

  if(!snap.exists()){
    window.location.href = "home.html";
    return;
  }

  const data = snap.data();

  if(data.tipo !== "admin" || data.ativo === false){
    window.location.href = "home.html";
  }
});

// 💬 MSG
function msg(txt,cor){
  const m = document.getElementById("msg");
  m.innerText = txt;
  m.style.color = cor;
}

// ➕ CRIAR
window.criarUser = async()=>{

  let email = emailInput.value;
  let senha = senhaInput.value;
  let saldo = parseInt(saldoInput.value) || 0;
  let tipo = tipoInput.value;

  if(!email || !senha){
    msg("Preencha tudo","red");
    return;
  }

  try{

    await createUserWithEmailAndPassword(auth,email,senha);

    const id = email.replace(/\./g,"_");

    await setDoc(doc(db,"usuarios",id),{
      email,
      saldo,
      tipo,
      ativo:true
    });

    msg("Usuário criado!","lightgreen");

  }catch(e){
    msg("Erro: "+e.message,"red");
  }
}

// 👥 LISTAR USERS
onSnapshot(collection(db,"usuarios"), (snap)=>{

  let html = "";

  snap.forEach(docu=>{
    let d = docu.data();

    html += `
    <div class="card">
      📧 ${d.email}<br>
      💰 ${d.saldo} MT<br>
      👤 ${d.tipo}<br>
      🔒 ${d.ativo ? "Ativo" : "Bloqueado"}

      <div class="actions">
        <button class="blue" onclick="toggle('${docu.id}',${d.ativo})">
          ${d.ativo ? "Desativar" : "Ativar"}
        </button>

        <button class="red" onclick="apagar('${docu.id}')">
          Apagar
        </button>
      </div>
    </div>
    `;
  });

  usuarios.innerHTML = html;
});

// 🔄 ATIVAR/DESATIVAR
window.toggle = async(id,ativo)=>{
  await updateDoc(doc(db,"usuarios",id),{
    ativo:!ativo
  });
}

// 🗑 APAGAR
window.apagar = async(id)=>{
  await deleteDoc(doc(db,"usuarios",id));
}

// 📦 PEDIDOS
onSnapshot(collection(db,"pedidos"), (snap)=>{

  let html = "";

  snap.forEach(docu=>{
    let d = docu.data();

    html += `
    <div class="card">
      📧 ${d.email}<br>
      📱 ${d.numero}<br>
      📦 ${d.pacote}<br>
      💰 ${d.preco} MT<br>
      📌 ${d.status}

      <div class="actions">
        <button class="green" onclick="aprovar('${docu.id}')">✔</button>
        <button class="red" onclick="rejeitar('${docu.id}')">✖</button>
      </div>
    </div>
    `;
  });

  pedidos.innerHTML = html;
});

// ✔ APROVAR
window.aprovar = async(id)=>{
  await updateDoc(doc(db,"pedidos",id),{
    status:"aprovado"
  });
}

// ✖ REJEITAR
window.rejeitar = async(id)=>{
  await updateDoc(doc(db,"pedidos",id),{
    status:"rejeitado"
  });
}

</script>

</body>
</html>
