<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* TOPO */
.topo{
  background:#020617;
  padding:15px;
  text-align:center;
  font-size:18px;
}

/* BOX */
.box{
  padding:15px;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}

/* BOTÕES */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.add{ background:#22c55e; color:white; }
.ok{ background:#22c55e; color:white; }
.no{ background:#ef4444; color:white; }

/* CARDS */
.card{
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

/* MSG */
#msg{
  text-align:center;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="topo">⚙️ Painel Admin</div>

<div class="box">

<h3>➕ Criar Usuário</h3>

<input id="email" placeholder="Email">
<input id="senha" placeholder="Senha">
<input id="saldo" type="number" placeholder="Saldo">

<select id="tipo">
  <option value="user">User</option>
  <option value="admin">Admin</option>
</select>

<button class="btn add" onclick="criarUser()">Criar</button>

<div id="msg"></div>

</div>

<div class="box">
<h3>👥 Usuários</h3>
<div id="users"></div>
</div>

<div class="box">
<h3>📦 Pedidos</h3>
<div id="pedidos"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYynjujS00ewRLDRKUJ2sVNv6FJFl5G9s",
  authDomain: "vertex-megas.firebaseapp.com",
  projectId: "vertex-megas"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const msg = document.getElementById("msg");

// 🔥 FUNÇÃO MENSAGEM
function mostrar(texto, cor){
  msg.innerText = texto;
  msg.style.color = cor;
  setTimeout(()=> msg.innerText = "", 4000);
}

// 🔥 CRIAR USUÁRIO
window.criarUser = async function(){

  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;
  let saldo = parseInt(document.getElementById("saldo").value) || 0;
  let tipo = document.getElementById("tipo").value;

  if(!email || !senha){
    mostrar("Preencha tudo!", "red");
    return;
  }

  try{

    // 🔐 cria auth
    await createUserWithEmailAndPassword(auth,email,senha);

    // 🔑 ID baseado no email
    const id = email.replace(/\./g,"_");

    // 💾 salvar no banco
    await setDoc(doc(db,"usuarios",id),{
      email,
      saldo,
      tipo
    });

    mostrar("Usuário criado!", "green");

  }catch(e){
    mostrar(e.message,"red");
  }
}


// 🔥 LISTAR USUÁRIOS
onSnapshot(collection(db,"usuarios"), (snap)=>{

  const div = document.getElementById("users");
  div.innerHTML = "";

  snap.forEach(docu=>{
    let d = docu.data();

    div.innerHTML += `
      <div class="card">
        📧 ${d.email}<br>
        💰 ${d.saldo} MT<br>
        🛡️ ${d.tipo}
      </div>
    `;
  });

});


// 🔥 LISTAR PEDIDOS
onSnapshot(collection(db,"pedidos"), (snap)=>{

  const div = document.getElementById("pedidos");
  div.innerHTML = "";

  snap.forEach(docu=>{
    let d = docu.data();

    div.innerHTML += `
      <div class="card">
        📧 ${d.email}<br>
        📱 ${d.numero}<br>
        📦 ${d.pacote}<br>
        💰 ${d.preco} MT<br>
        📌 ${d.status}<br>

        <button class="btn ok" onclick="aprovar('${docu.id}')">Aprovar</button>
        <button class="btn no" onclick="rejeitar('${docu.id}')">Rejeitar</button>
      </div>
    `;
  });

});


// 🔥 APROVAR
window.aprovar = async function(id){
  await updateDoc(doc(db,"pedidos",id),{
    status:"aprovado"
  });
}


// 🔥 REJEITAR
window.rejeitar = async function(id){
  await updateDoc(doc(db,"pedidos",id),{
    status:"rejeitado"
  });
}

</script>

</body>
</html>
