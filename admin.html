<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
}

/* TOPO */
.topo{
  padding:20px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background:#020617;
}

/* CAIXA */
.box{
  background:#1e293b;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

/* INPUT */
input, select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}

/* BOTÕES */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.criar{background:#22c55e;color:white;}
.add{background:#3b82f6;color:white;}

/* LISTA */
.card{
  background:#020617;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}

.linha{
  font-size:14px;
  margin:3px 0;
}

/* BOTÕES CARD */
.actions button{
  width:auto;
  padding:8px;
  margin-top:5px;
  margin-right:5px;
  border-radius:8px;
}

.green{background:#22c55e;color:white;}
.red{background:#ef4444;color:white;}
.yellow{background:#eab308;color:black;}
.blue{background:#3b82f6;color:white;}

/* MSG */
#msg{
  text-align:center;
  margin:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="topo">⚙️ Painel Admin PRO</div>

<div id="msg"></div>

<!-- CRIAR USUÁRIO -->
<div class="box">
<h3>➕ Criar Usuário</h3>

<input id="email" placeholder="Email">
<input id="senha" placeholder="Senha">

<select id="tipo">
  <option value="user">User</option>
  <option value="admin">Admin</option>
  <option value="admin2">Admin Nível 2</option>
</select>

<input id="saldo" type="number" placeholder="Saldo inicial">

<button class="criar" onclick="criar()">Criar Usuário</button>
</div>

<!-- USUÁRIOS -->
<div class="box">
<h3>👥 Usuários</h3>
<div id="usuarios"></div>
</div>

<!-- PEDIDOS -->
<div class="box">
<h3>📦 Pedidos</h3>
<div id="pedidos"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  createUserWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  updateDoc,
  deleteDoc,
  getDoc,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYynjujS00ewRLDRKUJ2sVNv6FJFl5G9s",
  authDomain: "vertex-megas.firebaseapp.com",
  projectId: "vertex-megas"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const msg = document.getElementById("msg");

// 🔐 PROTEGER ADMIN
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    window.location.href="index.html";
    return;
  }

  const emailId = user.email.replace(/\./g,"_");
  const ref = doc(db,"usuarios",emailId);
  const snap = await getDoc(ref);

  if(!snap.exists() || (snap.data().tipo !== "admin" && snap.data().tipo !== "admin2")){
    msg.innerText = "❌ Acesso negado";
    setTimeout(()=>window.location.href="home.html",2000);
  }
});

// 🔥 CRIAR USUÁRIO SEM SAIR
window.criar = async function(){

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const tipo = document.getElementById("tipo").value;
  const saldo = parseInt(document.getElementById("saldo").value) || 0;

  try{

    const tempApp = initializeApp(firebaseConfig,"temp");
    const tempAuth = getAuth(tempApp);

    await createUserWithEmailAndPassword(tempAuth,email,senha);

    const emailId = email.replace(/\./g,"_");

    await setDoc(doc(db,"usuarios",emailId),{
      email,
      saldo,
      tipo,
      ativo:true
    });

    msg.innerText="✅ Usuário criado!";
    msg.style.color="lightgreen";

    await tempAuth.signOut();

  }catch(e){
    msg.innerText="❌ "+e.message;
    msg.style.color="red";
  }
}

// 🔥 LISTAR USUÁRIOS
onSnapshot(collection(db,"usuarios"),(snap)=>{
  const div=document.getElementById("usuarios");
  div.innerHTML="";

  snap.forEach(docu=>{
    const d=docu.data();

    div.innerHTML+=`
    <div class="card">
      <div class="linha">📧 ${d.email}</div>
      <div class="linha">💰 ${d.saldo} MT</div>
      <div class="linha">🔑 ${d.tipo}</div>
      <div class="linha">📌 ${d.ativo ? "Ativo":"Bloqueado"}</div>

      <div class="actions">
        <button class="green" onclick="ativar('${docu.id}')">Ativar</button>
        <button class="yellow" onclick="desativar('${docu.id}')">Desativar</button>
        <button class="blue" onclick="addSaldo('${docu.id}')">+Saldo</button>
        <button class="red" onclick="apagar('${docu.id}')">Apagar</button>
      </div>
    </div>
    `;
  });
});

// 🔧 FUNÇÕES
window.ativar=id=>updateDoc(doc(db,"usuarios",id),{ativo:true});
window.desativar=id=>updateDoc(doc(db,"usuarios",id),{ativo:false});

window.apagar=id=>{
  deleteDoc(doc(db,"usuarios",id));
};

window.addSaldo=async(id)=>{
  const valor = prompt("Valor:");
  if(!valor) return;

  const ref=doc(db,"usuarios",id);
  const snap=await getDoc(ref);

  let saldo=snap.data().saldo||0;

  await updateDoc(ref,{
    saldo: saldo + parseInt(valor)
  });
};

// 🔥 PEDIDOS
onSnapshot(collection(db,"pedidos"),(snap)=>{
  const div=document.getElementById("pedidos");
  div.innerHTML="";

  snap.forEach(docu=>{
    const d=docu.data();

    div.innerHTML+=`
    <div class="card">
      📧 ${d.email}<br>
      📱 ${d.numero}<br>
      📦 ${d.pacote}<br>
      💰 ${d.preco} MT<br>
      📌 ${d.status}<br>

      <button class="green" onclick="aprovar('${docu.id}')">Aprovar</button>
      <button class="red" onclick="rejeitar('${docu.id}')">Rejeitar</button>
    </div>
    `;
  });
});

window.aprovar=id=>updateDoc(doc(db,"pedidos",id),{status:"aprovado"});
window.rejeitar=id=>updateDoc(doc(db,"pedidos",id),{status:"rejeitado"});

</script>

</body>
</html>
