<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.topo{
  padding:20px;
  text-align:center;
  background:#020617;
  font-size:20px;
}

.box{
  padding:15px;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.green{background:#22c55e;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin:10px;
}

.msg{
  text-align:center;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="topo">⚙️ Painel Admin</div>

<div class="box">

<h3>➕ Criar Usuário</h3>

<input id="email" placeholder="Email">
<input id="senha" placeholder="Senha">
<input id="saldo" type="number" placeholder="Saldo inicial">

<select id="tipo">
  <option value="user">Usuário</option>
  <option value="admin">Admin</option>
</select>

<button class="btn green" onclick="criarUser()">Criar Usuário</button>

<div id="msg"></div>

</div>

<div class="box">
<h3>👥 Usuários</h3>
<div id="usuarios"></div>
</div>

<div class="box">
<h3>📦 Pedidos</h3>
<div id="pedidos"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged, createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, doc, setDoc, getDoc,
  collection, onSnapshot, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "vertex-megas.firebaseapp.com",
  projectId: "vertex-megas"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let adminEmail = null;

// 🔐 PROTEGER PAINEL
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    window.location.href = "index.html";
    return;
  }

  adminEmail = user.email.replace(/\./g,"_");

  const ref = doc(db,"usuarios",adminEmail);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    window.location.href = "home.html";
    return;
  }

  const data = snap.data();

  if(data.tipo !== "admin" || data.ativo === false){
    window.location.href = "home.html";
  }
});

// 💬 mensagem
function mostrar(texto, cor="white"){
  const m = document.getElementById("msg");
  m.innerText = texto;
  m.style.color = cor;
}

// ➕ CRIAR USUÁRIO
window.criarUser = async()=>{

  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;
  let saldo = parseInt(document.getElementById("saldo").value);
  let tipo = document.getElementById("tipo").value;

  if(!email || !senha){
    mostrar("Preencha tudo","red");
    return;
  }

  try{

    const cred = await createUserWithEmailAndPassword(auth,email,senha);

    const id = email.replace(/\./g,"_");

    await setDoc(doc(db,"usuarios",id),{
      email,
      saldo: saldo || 0,
      tipo,
      ativo: true
    });

    mostrar("Usuário criado!","lightgreen");

  }catch(e){
    mostrar("Erro: "+e.message,"red");
  }
}

// 👥 LISTAR USUÁRIOS
onSnapshot(collection(db,"usuarios"), (snap)=>{
  let html = "";

  snap.forEach(docu=>{
    let d = docu.data();

    html += `
    <div class="card">
      📧 ${d.email}<br>
      💰 ${d.saldo} MT<br>
      👤 ${d.tipo}<br>
      🔒 ${d.ativo ? "Ativo" : "Bloqueado"}

      <button class="btn blue" onclick="toggle('${docu.id}', ${d.ativo})">
        ${d.ativo ? "Desativar" : "Ativar"}
      </button>

      <button class="btn red" onclick="apagar('${docu.id}')">
        Apagar
      </button>
    </div>
    `;
  });

  document.getElementById("usuarios").innerHTML = html;
});

// 🔄 ATIVAR/DESATIVAR
window.toggle = async(id, ativo)=>{
  await updateDoc(doc(db,"usuarios",id),{
    ativo: !ativo
  });
}

// ❌ APAGAR
window.apagar = async(id)=>{
  await deleteDoc(doc(db,"usuarios",id));
}

// 📦 PEDIDOS
onSnapshot(collection(db,"pedidos"), (snap)=>{
  let html = "";

  snap.forEach(docu=>{
    let d = docu.data();

    html += `
    <div class="card">
      📧 ${d.email}<br>
      📱 ${d.numero}<br>
      📦 ${d.pacote}<br>
      💰 ${d.preco} MT<br>
      📌 ${d.status}

      <button class="btn green" onclick="aprovar('${docu.id}')">
        Aprovar
      </button>

      <button class="btn red" onclick="rejeitar('${docu.id}')">
        Rejeitar
      </button>
    </div>
    `;
  });

  document.getElementById("pedidos").innerHTML = html;
});

// ✔️ APROVAR
window.aprovar = async(id)=>{
  await updateDoc(doc(db,"pedidos",id),{
    status:"aprovado"
  });
}

// ❌ REJEITAR
window.rejeitar = async(id)=>{
  await updateDoc(doc(db,"pedidos",id),{
    status:"rejeitado"
  });
}

</script>

</body>
</html>
