<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
}

.topo{
  padding:20px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background:#020617;
}

.box{
  background:#1e293b;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.criar{background:#22c55e;}
.green{background:#22c55e;}
.red{background:#ef4444;}
.yellow{background:#eab308;color:black;}
.blue{background:#3b82f6;}

.card{
  background:#020617;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}

.actions button{
  width:auto;
  padding:8px;
  margin-top:5px;
  margin-right:5px;
  border-radius:8px;
}

#msg{
  text-align:center;
  margin:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="topo">⚙️ Painel Admin PRO</div>
<div id="msg"></div>

<!-- CRIAR -->
<div class="box">
<h3>➕ Criar Usuário</h3>

<input id="emailInput" placeholder="Email">
<input id="senhaInput" placeholder="Senha">

<select id="tipoSelect">
<option value="user">User</option>
<option value="admin">Admin</option>
<option value="admin2">Admin Nível 2</option>
</select>

<input id="saldoInput" type="number" placeholder="Saldo inicial">

<button class="criar" onclick="criar()">Criar Usuário</button>
</div>

<!-- USUÁRIOS -->
<div class="box">
<h3>👥 Usuários</h3>
<div id="usuarios"></div>
</div>

<!-- PEDIDOS -->
<div class="box">
<h3>📦 Pedidos</h3>
<div id="pedidos"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,onAuthStateChanged,createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,doc,setDoc,updateDoc,getDoc,
  collection,onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "vertex-megas.firebaseapp.com",
  projectId: "vertex-megas"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const msg = document.getElementById("msg");

// 🔐 PROTEGER ADMIN
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location="index.html";
    return;
  }

  const id = user.email.replace(/\./g,"_");
  const snap = await getDoc(doc(db,"usuarios",id));

  if(!snap.exists() || !["admin","admin2"].includes(snap.data().tipo)){
    msg.innerText="❌ Acesso negado";
    msg.style.color="red";
    setTimeout(()=>location="home.html",1500);
  }
});

// 🔥 CRIAR USUÁRIO
window.criar = async ()=>{

  const email = emailInput.value;
  const senha = senhaInput.value;
  const tipo = tipoSelect.value;
  const saldo = parseInt(saldoInput.value)||0;

  if(!email || !senha){
    msg.innerText="⚠️ Preencha tudo";
    msg.style.color="orange";
    return;
  }

  try{
    const temp = initializeApp(firebaseConfig,"temp"+Date.now());
    const tempAuth = getAuth(temp);

    await createUserWithEmailAndPassword(tempAuth,email,senha);

    const id = email.replace(/\./g,"_");

    await setDoc(doc(db,"usuarios",id),{
      email, saldo, tipo, ativo:true
    });

    msg.innerText="✅ Usuário criado";
    msg.style.color="lightgreen";

    emailInput.value="";
    senhaInput.value="";
    saldoInput.value="";

  }catch(e){
    msg.innerText="❌ "+e.message;
    msg.style.color="red";
  }
};

// 🔥 LISTAR USUÁRIOS
onSnapshot(collection(db,"usuarios"),snap=>{
  usuarios.innerHTML="";

  snap.forEach(docu=>{
    const d=docu.data();

    usuarios.innerHTML+=`
    <div class="card">
      📧 ${d.email}<br>
      💰 ${d.saldo} MT<br>
      🔑 ${d.tipo}<br>
      📌 ${d.ativo?"Ativo":"Bloqueado"}<br>

      <div class="actions">
        <button class="green" onclick="ativar('${docu.id}')">Ativar</button>
        <button class="yellow" onclick="desativar('${docu.id}')">Desativar</button>
        <button class="blue" onclick="addSaldo('${docu.id}')">+Saldo</button>
      </div>
    </div>
    `;
  });
});

// 🔧 FUNÇÕES
window.ativar = async(id)=>{
  await updateDoc(doc(db,"usuarios",id),{ativo:true});
  msg.innerText="✅ Usuário ativado";
  msg.style.color="lightgreen";
};

window.desativar = async(id)=>{
  await updateDoc(doc(db,"usuarios",id),{ativo:false});
  msg.innerText="🚫 Usuário desativado";
  msg.style.color="orange";
};

window.addSaldo = async(id)=>{
  const valor = prompt("Valor:");
  if(!valor) return;

  const ref = doc(db,"usuarios",id);
  const snap = await getDoc(ref);

  await updateDoc(ref,{
    saldo:(snap.data().saldo||0)+parseInt(valor)
  });

  msg.innerText="💰 Saldo atualizado";
  msg.style.color="lightblue";
};

// 🔥 PEDIDOS
onSnapshot(collection(db,"pedidos"),snap=>{
  pedidos.innerHTML="";

  snap.forEach(docu=>{
    const d=docu.data();

    pedidos.innerHTML+=`
    <div class="card">
      📧 ${d.email}<br>
      📱 ${d.numero}<br>
      📦 ${d.pacote}<br>
      💰 ${d.preco} MT<br>
      📌 ${d.status}<br>

      <button class="green" onclick="aprovar('${docu.id}')">Aprovar</button>
      <button class="red" onclick="rejeitar('${docu.id}')">Rejeitar</button>
    </div>
    `;
  });
});

window.aprovar=id=>updateDoc(doc(db,"pedidos",id),{status:"aprovado"});
window.rejeitar=id=>updateDoc(doc(db,"pedidos",id),{status:"rejeitado"});

</script>

</body>
  </html>
