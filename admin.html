<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* topo */
.topo{
  padding:20px;
  text-align:center;
  background:#020617;
}

/* msg */
.msg{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  border-radius:10px;
  display:none;
}
.ok{background:#22c55e;}
.erro{background:#ef4444;}

/* box */
.box{padding:15px;}

input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:none;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.add{background:#22c55e;}
.admin{background:#6366f1;}
.remove{background:#ef4444;}

/* lista */
.card{
  background:#1e293b;
  margin:10px;
  padding:12px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="topo">⚙️ Painel Admin</div>
<div id="msg" class="msg"></div>

<!-- 🔎 BUSCAR -->
<div class="box">
  <h3>🔎 Buscar Usuário</h3>
  <input id="emailUser" placeholder="Email">
  <button class="btn add" onclick="buscarUser()">Buscar</button>

  <div id="userInfo"></div>
</div>

<!-- 📦 PEDIDOS -->
<div id="listaPedidos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYynjujS00ewRLDRKUJ2sVNv6FJFl5G9s",
  authDomain: "vertex-megas.firebaseapp.com",
  projectId: "vertex-megas"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function msg(t,c){
  const m=document.getElementById("msg");
  m.innerText=t;
  m.className="msg "+c;
  m.style.display="block";
  setTimeout(()=>m.style.display="none",3000);
}

// 🔐 PROTEÇÃO ADMIN
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    document.body.innerHTML="🔒 Faça login";
    return;
  }

  const id=user.email.replace(/\./g,"_");
  const snap=await getDoc(doc(db,"usuarios",id));

  if(!snap.exists() || !snap.data().isAdmin){
    document.body.innerHTML="❌ Acesso negado";
    return;
  }

  carregarPedidos();
});

// 🔎 BUSCAR USUÁRIO
window.buscarUser = async function(){
  const email=document.getElementById("emailUser").value;

  if(!email){
    msg("Digite email","erro");
    return;
  }

  const id=email.replace(/\./g,"_");
  const ref=doc(db,"usuarios",id);
  const snap=await getDoc(ref);

  if(!snap.exists()){
    msg("Usuário não encontrado","erro");
    return;
  }

  const d=snap.data();

  document.getElementById("userInfo").innerHTML=`
    <div class="card">
      👤 ${d.nome || "Sem nome"}<br>
      📧 ${email}<br>
      💰 Saldo: ${d.saldo || 0} MT<br>
      👑 ${d.isAdmin ? "Admin" : "User"}

      <input id="valorAdd" type="number" placeholder="Valor">

      <button class="btn add" onclick="addSaldo('${email}')">➕ Saldo</button>
      <button class="btn admin" onclick="setAdmin('${email}',true)">👑 Tornar Admin</button>
      <button class="btn remove" onclick="setAdmin('${email}',false)">❌ Remover Admin</button>
    </div>
  `;
}

// 💰 ADICIONAR SALDO
window.addSaldo = async function(email){
  const valor = parseInt(document.getElementById("valorAdd").value);

  if(!valor){
    msg("Digite valor","erro");
    return;
  }

  const id=email.replace(/\./g,"_");
  const ref=doc(db,"usuarios",id);
  const snap=await getDoc(ref);

  const saldo=snap.data().saldo || 0;

  await updateDoc(ref,{
    saldo: saldo + valor
  });

  msg("Saldo atualizado","ok");
  buscarUser();
}

// 👑 ADMIN
window.setAdmin = async function(email,valor){
  const id=email.replace(/\./g,"_");

  await updateDoc(doc(db,"usuarios",id),{
    isAdmin: valor
  });

  msg("Permissão alterada","ok");
  buscarUser();
}

// 📦 LISTAR PEDIDOS (EMAIL REAL)
function carregarPedidos(){

  const lista=document.getElementById("listaPedidos");

  onSnapshot(collection(db,"pedidos"),(snapshot)=>{
    lista.innerHTML="<h3 style='padding:10px'>📦 Pedidos</h3>";

    snapshot.forEach((docItem)=>{
      const data=docItem.data();

      lista.innerHTML+=`
        <div class="card">
          📧 ${data.email}<br>
          📱 ${data.numero}<br>
          📦 ${data.pacote}<br>
          💰 ${data.preco} MT<br>
          📌 ${data.status}

          <button class="btn add" onclick="aprovar('${docItem.id}')">✅ Aprovar</button>
          <button class="btn remove" onclick="rejeitar('${docItem.id}')">❌ Rejeitar</button>
        </div>
      `;
    });

  });
}

// ✅ APROVAR
window.aprovar = async function(id){
  await updateDoc(doc(db,"pedidos",id),{
    status:"aprovado"
  });

  msg("Pedido aprovado","ok");
}

// ❌ REJEITAR
window.rejeitar = async function(id){
  await updateDoc(doc(db,"pedidos",id),{
    status:"rejeitado"
  });

  msg("Pedido rejeitado","ok");
}

</script>

</body>
</html>
