<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venda de Megas</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* TOPO */
.topo{
  background: linear-gradient(135deg,#ff5f6d,#ff9966);
  color:white;
  padding:20px;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

#user{margin-top:5px;}
#saldo{margin-top:5px;font-weight:bold;}

/* TITULO */
.titulo{
  padding:10px 15px;
  font-weight:bold;
  color:#444;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

#lista{
  display: contents;
}

/* CARD */
.card{
  background:white;
  padding:12px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

.nome{font-weight:bold;}
.preco{color:#666;margin:5px 0;}

/* BOTÃO */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background: linear-gradient(45deg,#22c55e,#16a34a);
  color:white;
  font-weight:bold;
}

.voltar{
  grid-column: span 2;
  background:#ddd;
  color:black;
}

/* RESPONSIVO */
@media(max-width:350px){
  .container{grid-template-columns:1fr;}
}

/* 🔥 TOAST */
#toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%) translateY(50px);
  background:#111;
  color:#fff;
  padding:14px 20px;
  border-radius:12px;
  font-size:14px;
  font-weight:bold;
  opacity:0;
  transition:0.4s;
  z-index:9999;
}

#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.toast-sucesso{background:#22c55e;}
.toast-erro{background:#ef4444;}
.toast-aviso{background:#f59e0b;}
</style>
</head>

<body>

<div class="topo">
  <h2>📡 Megas Vodacom</h2>
  <p id="user">Olá...</p>
  <p id="saldo">💰 Saldo: 0 MT</p>
</div>

<div class="titulo">📅 DIÁRIOS</div>

<div class="container">
  <div id="lista"></div>
  <button class="voltar" onclick="voltar()">⬅ Voltar</button>
</div>

<!-- 🔥 TOAST -->
<div id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDYynjujS00ewRLDRKUJ2sVNv6FJFl5G9s",
  authDomain: "vertex-megas.firebaseapp.com",
  projectId: "vertex-megas"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 TOAST FUNCTION
window.toast = function(texto, tipo="sucesso"){
  const t = document.getElementById("toast");

  t.className = "";
  t.classList.add("show");

  if(tipo==="erro") t.classList.add("toast-erro");
  else if(tipo==="aviso") t.classList.add("toast-aviso");
  else t.classList.add("toast-sucesso");

  t.innerText = texto;

  setTimeout(()=>{
    t.classList.remove("show");
  },3000);
}

// 🔐 USER + SALDO
onAuthStateChanged(auth,(user)=>{
  if(user){

    document.getElementById("user").innerText = "Olá, " + user.email;

    const emailId = user.email.replace(/\./g,"_");
    const ref = doc(db,"usuarios",emailId);

    onSnapshot(ref,(snap)=>{
      if(snap.exists()){
        const saldo = snap.data().saldo || 0;
        document.getElementById("saldo").innerText =
          "💰 Saldo: " + saldo + " MT";
      }
    });

  }else{
    toast("Sessão expirada","erro");
    setTimeout(()=>window.location.href="index.html",1500);
  }
});

// PACOTES
const pacotes = [
  {mb:"370MB", preco:10},
  {mb:"512MB", preco:14},
  {mb:"750MB", preco:20},
  {mb:"1GB", preco:26},
  {mb:"1.3GB", preco:36},
  {mb:"1.5GB", preco:45},
  {mb:"2GB", preco:52},
  {mb:"2.3GB", preco:65},
  {mb:"3GB", preco:78},
  {mb:"3.5GB", preco:100},
  {mb:"4GB", preco:104},
  {mb:"5GB", preco:130},
  {mb:"6GB", preco:156},
  {mb:"7GB", preco:182}
];

// RENDER
const lista = document.getElementById("lista");

pacotes.forEach(p=>{
  lista.innerHTML += `
    <div class="card">
      <div class="nome">📦 ${p.mb}</div>
      <div class="preco">${p.preco} MT</div>
      <button onclick="comprar('${p.mb}',${p.preco})">
        Comprar
      </button>
    </div>
  `;
});

// COMPRAR
window.comprar = function(pacote, preco){
  toast("Abrindo compra...");
  setTimeout(()=>{
    window.location.href = `comprar.html?pacote=${pacote}&preco=${preco}`;
  },500);
}

// VOLTAR
window.voltar = function(){
  window.location.href="home.html";
}

</script>

</body>
  </html>
