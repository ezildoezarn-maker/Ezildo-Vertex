<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venda de Megas</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* TOPO */
.topo{
  background: linear-gradient(135deg,#ff5f6d,#ff9966);
  color:white;
  padding:20px;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

.topo h2{margin:0;}
.topo p{margin:5px 0 0;}

/* CONTAINER */
.container{
  padding:15px;
}

/* TITULO SECÇÃO */
.titulo{
  font-weight:bold;
  margin:15px 5px;
  color:#444;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.nome{
  font-size:17px;
  font-weight:bold;
}

.preco{
  color:#666;
  margin-top:4px;
}

/* BOTÃO */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:active{
  transform:scale(0.96);
}

/* VOLTAR */
.voltar{
  background:#ddd;
  color:black;
}
</style>
</head>

<body>

<div class="topo">
  <h2>📡 Megas Vodacom</h2>
  <p id="user">Olá...</p>
</div>

<div class="container">

  <div class="titulo">📅 DIÁRIOS</div>

  <!-- LISTA AUTOMÁTICA -->
  <div id="lista"></div>

  <button class="voltar" onclick="voltar()">⬅ Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYynjujS00ewRLDRKUJ2sVNv6FJFl5G9s",
  authDomain: "vertex-megas.firebaseapp.com",
  projectId: "vertex-megas"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 USER
onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("user").innerText = "Olá, " + user.email;
  }else{
    window.location.href = "index.html";
  }
});

// 📦 PACOTES (TUA TABELA)
const pacotes = [
  {mb:"370MB", preco:10},
  {mb:"512MB", preco:14},
  {mb:"750MB", preco:20},

  {mb:"1GB", preco:26},
  {mb:"1.3GB", preco:36},
  {mb:"1.5GB", preco:45},
  {mb:"2GB", preco:52},
  {mb:"2.3GB", preco:65},
  {mb:"3GB", preco:78},
  {mb:"3.5GB", preco:100},
  {mb:"4GB", preco:104},
  {mb:"5GB", preco:130},
  {mb:"6GB", preco:156},
  {mb:"7GB", preco:182}
];

// 🔥 RENDER
const lista = document.getElementById("lista");

pacotes.forEach(p=>{
  lista.innerHTML += `
    <div class="card">
      <div class="nome">📦 ${p.mb}</div>
      <div class="preco">${p.preco} MT</div>
      <button onclick="comprar('${p.mb}',${p.preco})">
        Comprar
      </button>
    </div>
  `;
});

// 🚀 IR COMPRA
window.comprar = function(pacote, preco){
  window.location.href = `comprar.html?pacote=${pacote}&preco=${preco}`;
}

// 🔙 VOLTAR
window.voltar = function(){
  window.location.href = "home.html";
}

</script>

</body>
</html>
