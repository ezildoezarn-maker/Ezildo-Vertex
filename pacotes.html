<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacotes</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
}

/* TOPO */
.topo{
  padding:20px;
  text-align:center;
  font-size:20px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:white;
  color:black;
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card h3{
  margin:10px 0;
}

.preco{
  font-size:18px;
  font-weight:bold;
  margin:10px 0;
}

/* BOTÃO */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background: linear-gradient(45deg,#36d1dc,#5b86e5);
  color:white;
  font-weight:bold;
}

/* VOLTAR */
.voltar{
  margin:15px;
  background:#eee;
  color:black;
}

/* RESPONSIVO */
@media(max-width:350px){
  .container{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="topo">📦 Escolher Pacote</div>

<div class="container">

  <div class="card">
    <h3>📶 100MB</h3>
    <div class="preco">10 MT</div>
    <button class="btn" onclick="comprar('100MB')">Comprar</button>
  </div>

  <div class="card">
    <h3>📶 500MB</h3>
    <div class="preco">40 MT</div>
    <button class="btn" onclick="comprar('500MB')">Comprar</button>
  </div>

  <div class="card">
    <h3>📶 1GB</h3>
    <div class="preco">70 MT</div>
    <button class="btn" onclick="comprar('1GB')">Comprar</button>
  </div>

</div>

<button class="btn voltar" onclick="voltar()">⬅ Voltar</button>

<script>

// 👉 enviar pacote escolhido
function comprar(pacote){
  // guardar pacote
  localStorage.setItem("pacoteEscolhido", pacote);

  // ir para página compra
  window.location.href = "comprar.html";
}

// voltar
function voltar(){
  window.location.href = "home.html";
}

</script>

</body>
</html>
