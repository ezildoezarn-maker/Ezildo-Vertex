<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suporte</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* FUNDO PREMIUM */
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  overflow: hidden;
}

/* BRILHO FUNDO */
body::before {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: rgba(0, 255, 255, 0.2);
  border-radius: 50%;
  top: -50px;
  left: -50px;
  filter: blur(100px);
}

body::after {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: rgba(255, 0, 150, 0.2);
  border-radius: 50%;
  bottom: -50px;
  right: -50px;
  filter: blur(100px);
}

/* CAIXA */
.box {
  position: relative;
  z-index: 1;
  width: 85%;
  max-width: 330px;
  padding: 25px;
  border-radius: 25px;
  text-align: center;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  color: white;
}

/* TEXTO */
h2 {
  margin-bottom: 5px;
}

p {
  color: #ccc;
  font-size: 14px;
}

/* BOTÕES */
.btn {
  width: 100%;
  padding: 13px;
  margin-top: 12px;
  border: none;
  border-radius: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  color: white;
}

/* CORES */
.suporte {
  background: linear-gradient(45deg, #00c6ff, #0072ff);
}

.canal {
  background: linear-gradient(45deg, #ff758c, #ff7eb3);
}

/* ANIMAÇÃO DE ENTRADA */
@keyframes entrar {
  from {
    opacity: 0;
    transform: scale(0.8) translateY(40px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

/* APLICA NA CAIXA */
.box {
  animation: entrar 2.5s ease;
}

.grupo {
  background: linear-gradient(45deg, #43e97b, #38f9d7);
}

.voltar {
  background: rgba(255,255,255,0.2);
}

/* EFEITOS */
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.btn:active {
  transform: scale(0.96);
}
</style>
</head>

<body>

<div class="box">
  <h2>💬 Suporte</h2>
  <p>Escolha uma opção abaixo</p>

  <button class="btn suporte" onclick="abrir('https://wa.me/258875189774')">
    📞 Contacto do Suporte
  </button>

  <button class="btn canal" onclick="abrir('https://whatsapp.com/channel/0029Vb620uF5vKAGXWzdnV3j')">
    📢 Canal Oficial
  </button>

  <button class="btn grupo" onclick="abrir('https://chat.whatsapp.com/BPqrafz6b8kBTzvbm2p60J')">
    👥 Grupo Oficial
  </button>

  <button class="btn voltar" onclick="voltar()">⬅ Voltar</button>
</div>

<script>
function abrir(link) {
  window.open(link, "_blank");
}

function voltar() {
  window.location.href = "home.html";
}
</script>

</body>
  </html>
