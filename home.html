<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
}

/* TOPO */
.topo {
  background: linear-gradient(135deg, #ff7e5f, #ff9966);
  color: white;
  padding: 25px;
  border-bottom-left-radius: 25px;
  border-bottom-right-radius: 25px;
}

.topo h2 {
  margin: 5px 0;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.card:hover {
  transform: scale(1.02);
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.card-content {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* CORES DIFERENTES */
.mega { background: linear-gradient(135deg, #ff9a9e, #fad0c4); }
.auto { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }
.normal { background: linear-gradient(135deg, #84fab0, #8fd3f4); }

.card h3 {
  margin: 10px;
}

.card button {
  margin: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #ff758c, #ffb199);
  color: white;
  font-weight: bold;
  font-size: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px;
  padding-bottom: 80px; /* espaço pro menu */
}

@media (max-width: 350px) {
  .container {
    grid-template-columns: 1fr;
  }
}

/* MENU */
.menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  border-top: 1px solid #ccc;
}

#aviso {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  display: none;
  font-size: 14px;
  z-index: 999;
}

.menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid #eee;
  box-shadow: 0 -3px 10px rgba(0,0,0,0.05); /* sombra geral */
}

.menu span {
  background: #fff;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 13px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1); /* sombra no botão */
  transition: 0.2s;
}

/* efeito ao clicar */
.menu span:active {
  transform: scale(0.95);
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="topo">
  <p>✨ Todos os produtos</p>
  <h2 id="user">Carregando...</h2>
</div>

<div class="container">

  <!-- MEGAS -->
  <div class="card mega">
    <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=800&q=80">
    <h3>📶 Venda de Megas</h3>
    <button onclick="irComprar()">Ver Pacotes</button>
  </div>
  
  <!-- BOT AUTOMÁTICO -->
  <div class="card auto">
    <img src="https://images.unsplash.com/photo-1581090700227-1e37b190418e?auto=format&fit=crop&w=800&q=80">
    <h3>🤖 Bot Automático</h3>
    <button onclick="mostrarAviso('INDISPONIVEL POR ENQUANTO')">Ver Pacotes</button>
  </div>

  <!-- BOT NORMAL -->
    <div class="card normal">
     <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
    <h3>🤖 Bot Normal</h3>
    <button onclick="mostrarAviso('INDISPONIVEL POR ENQUANTO')">Ver Pacotes</button>
  </div>
</div>

<div id="aviso"></div>

<!-- MENU -->
<div class="menu">
  <span onclick="irLoja()">🛍️ Loja</span>
  <span onclick="irPerfil()">👤 Perfil</span>
  <span onclick="irSuporte()">💬 Suporte</span>
  <span onclick="irGrupo()">👥 Painel Admin</span>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYynjujS00ewRLDRKUJ2sVNv6FJFl5G9s",
  authDomain: "vertex-megas.firebaseapp.com",
  projectId: "vertex-megas",
  storageBucket: "vertex-megas.appspot.com",
  messagingSenderId: "639387672439",
  appId: "1:639387672439:web:28c1be3827998c4f41cb72"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// MOSTRAR NOME REAL
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("user").innerText = "Olá, " + user.email;
  } else {
    window.location.href = "index.html";
  }
});

// FUNÇÕES
window.abrirPacotes = function() {
  window.location.href = "pacotes.html";
}

window.irLoja = function() {
  window.location.href = "home.html";
}

window.irPerfil = function() {
  window.location.href = "perfil.html";
  }


window.irSuporte = function() {
  window.location.href = "suporte.html";
}

window.irGrupo = function() {
  window.location.href = "admin.html";
  }

  window.irComprar = function() {
  window.location.href = "pacotes.html";
  }

window.mostrarAviso = function(texto) {
  const aviso = document.getElementById("aviso");
  aviso.innerText = texto;
  aviso.style.display = "block";

  setTimeout(() => {
    aviso.style.display = "none";
  }, 4000);
}

</script>

</body>
</html>
