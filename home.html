<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Minha Loja</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
}

/* topo */
.topo {
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  padding: 15px;
  color: white;
}

.online {
  background: #ff8fa3;
  padding: 5px 10px;
  border-radius: 20px;
  display: inline-block;
  font-size: 12px;
}

/* container */
.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

/* card */
.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

/* imagem */
.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

/* conteúdo */
.content {
  padding: 10px;
}

.titulo {
  font-weight: bold;
  margin-bottom: 5px;
}

/* botão */
.btn {
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  border: none;
  padding: 10px;
  width: 100%;
  color: white;
  border-radius: 10px;
  margin-top: 10px;
}

/* menu inferior */
.menu {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  border-top: 1px solid #ccc;
}

.menu div {
  font-size: 12px;
  text-align: center;
}
</style>

</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="online">🟢 5 online agora</div>
  <h3>✨ Todos os produtos</h3>
  <p id="user"></p>
</div>

<!-- PRODUTOS -->
<div class="container">

  <!-- MEGAS -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c">
    <div class="content">
      <div class="titulo">📶 Venda de Megas</div>
      <button class="btn" onclick="ir('megas.html')">Ver Pacotes</button>
    </div>
  </div>

  <!-- BOT AUTO -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1531746790731-6c087fecd65a">
    <div class="content">
      <div class="titulo">🤖 Bot Automático</div>
      <button class="btn" onclick="ir('bot-auto.html')">Ver Pacotes</button>
    </div>
  </div>

  <!-- BOT NORMAL -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1556155092-490a1ba16284">
    <div class="content">
      <div class="titulo">💼 Bot Normal</div>
      <button class="btn" onclick="ir('bot-normal.html')">Ver Pacotes</button>
    </div>
  </div>

</div>

<!-- MENU -->
<div class="menu">
  <div>🛍️ Loja</div>
  <div>👤 Perfil</div>
  <div>💬 Suporte</div>
  <div>🟢 Grupo</div>
</div>

<script>
document.getElementById("user").innerText =
"Olá, " + localStorage.getItem("user");

function ir(pagina) {
  window.location.href = pagina;
}
</script>

</body>
  </html>
